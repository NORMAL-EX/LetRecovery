name: Build and Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要构建并发布的分支(留空=用上面 Run workflow 选的分支)"
        required: false
        default: ""
      tag:
        description: "Release 标签(留空=用当天日期,如 2026.6.17)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Pin reproducible build timestamp
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            正常系统端
            PE端

      - name: Verify Rust workspace before release
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo check --workspace --all-targets --locked
          # Rust 1.88 reports this style-only lint differently from newer supported toolchains.
          # Keep every behavioral warning blocking while avoiding a version-dependent rewrite.
          cargo clippy --workspace --all-targets --locked --features "LetRecovery/non-elevated-tests,letrecovery-pe/non-elevated-tests" -- -D warnings -A clippy::uninlined_format_args
          cargo test --workspace --no-run --locked --features "LetRecovery/non-elevated-tests,letrecovery-pe/non-elevated-tests"
          cargo test -p lr-core --locked
          cargo test -p letrecovery-pe --locked --features non-elevated-tests
          cargo test -p LetRecovery --locked --features non-elevated-tests

      - name: Build system-side exe (LetRecovery.exe)
        shell: bash
        working-directory: 正常系统端
        run: |
          set -euo pipefail
          cargo build --release --locked

      - name: Build PE-side exe (LetRecoveryPE.exe)
        shell: bash
        working-directory: PE端
        run: |
          set -euo pipefail
          cargo build --release --locked

      - name: Download base package (template)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          gh release download release \
            --repo NORMAL-EX/letrecovery-package \
            --pattern package.7z --dir .
          ls -la package.7z

      - name: Extract base package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkg
          7z x package.7z -opkg -y >/dev/null
          test -f "pkg/LetRecovery.exe"            || { echo "底包缺少 LetRecovery.exe"; exit 1; }
          test -f "pkg/bin/pe/LetRecovery_PE.wim"  || { echo "底包缺少 bin/pe/LetRecovery_PE.wim"; exit 1; }

      - name: Strip runtime junk from package
        shell: bash
        run: |
          set -euo pipefail
          # 底包里可能混入 Ghost 运行时垃圾（崩溃转储 *.dmp / 错误日志 GHOSTERR.TXT、ghstwarn.txt），
          # 与源码仓库 .gitignore 同一套规则删掉，别让它们随正式 release 发出去。
          find pkg -type f \( \
            -iname '*.dmp' -o \
            -iname 'GHOSTERR.TXT' -o \
            -iname 'ghstwarn.txt' -o \
            -iname '*.tmp' -o \
            -iname 'Thumbs.db' -o \
            -iname '.DS_Store' -o \
            -iname '*.swp' \
          \) -print -delete || true
          echo "运行时垃圾清理完成。"

      - name: Validate bundled PCA2023 offline assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $assetDir = "pkg\bin\pca2023"
          $lockFile = "docs\PCA2023_RESOURCES.lock.json"
          $required = @(
            "pca2023-legacy-amd64.wim",
            "pca2023-windows10-x86.wim",
            "pca2023-modern-amd64.wim"
          )
          if (-not (Test-Path -LiteralPath $lockFile -PathType Leaf)) {
            throw "缺少 PCA2023 资源锁定清单: $lockFile"
          }
          $manifest = Get-Content -LiteralPath $lockFile -Raw -Encoding UTF8 | ConvertFrom-Json
          $lockedNames = @($manifest.packages | ForEach-Object { [string]$_.file })
          if (@(Compare-Object $required $lockedNames).Count -ne 0) {
            throw "PCA2023 资源锁定清单与固定资源集合不一致"
          }
          foreach ($package in $manifest.packages) {
            $name = [string]$package.file
            if ([IO.Path]::GetFileName($name) -ne $name) {
              throw "PCA2023 资源锁定清单包含非法文件名: $name"
            }
            $path = Join-Path $assetDir $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "底包缺少 PCA2023 离线资源: $path"
            }
            $item = Get-Item -LiteralPath $path
            if ($item.Length -ne [int64]$package.size) {
              throw "PCA2023 资源大小不匹配: $name ($($item.Length) != $($package.size))"
            }
            $actualHash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -ne [string]$package.sha256) {
              throw "PCA2023 资源 SHA-256 不匹配: $name"
            }
            Write-Host "Validated PCA2023 resource: $name"
          }

      - name: Relocate system-side lang/diskpart into bin
        shell: bash
        run: |
          set -euo pipefail
          # 正常系统端新布局：底包根目录的 lang/diskpart 收进 bin/（PE 端在 WIM 内的 lang 不受影响）。
          mkdir -p pkg/bin
          for d in lang diskpart; do
            if [ -d "pkg/$d" ]; then
              mkdir -p "pkg/bin/$d"
              cp -rf "pkg/$d/." "pkg/bin/$d/"
              rm -rf "pkg/$d"
              echo "relocated pkg/$d -> pkg/bin/$d"
            fi
          done

      - name: Validate and synchronize release language catalogs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $codes = @("en-US", "ja-JP", "ko-KR", "fr-FR", "de-DE")
          $catalogs = @{}
          foreach ($code in $codes) {
            $path = Join-Path "assets\release\lang" "$code.json"
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "缺少发布语言文件: $path"
            }
            $catalog = Get-Content -LiteralPath $path -Raw -Encoding UTF8 | ConvertFrom-Json -AsHashtable
            if (-not $catalog.language -or -not $catalog.author -or -not $catalog.data) {
              throw "语言文件结构无效: $path"
            }
            $catalogs[$code] = $catalog
          }
          $referenceKeys = @($catalogs["en-US"].data.Keys | Sort-Object)
          foreach ($code in $codes) {
            $keys = @($catalogs[$code].data.Keys | Sort-Object)
            if ($keys.Count -ne $referenceKeys.Count -or
                (Compare-Object -ReferenceObject $referenceKeys -DifferenceObject $keys)) {
              throw "语言文件键集合与 en-US 不一致: $code"
            }
            foreach ($key in $referenceKeys) {
              $translated = [string]$catalogs[$code].data[$key]
              if ([string]::IsNullOrWhiteSpace($translated)) {
                throw "语言文件包含空译文: $code / $key"
              }
              $referencePlaceholders = @(
                [regex]::Matches([string]$catalogs["en-US"].data[$key], '\{[^{}]*\}') |
                  ForEach-Object { $_.Value }
              )
              $translatedPlaceholders = @(
                [regex]::Matches($translated, '\{[^{}]*\}') |
                  ForEach-Object { $_.Value }
              )
              if (Compare-Object -ReferenceObject $referencePlaceholders `
                  -DifferenceObject $translatedPlaceholders) {
                throw "语言文件格式占位符与 en-US 不一致: $code / $key"
              }
            }
          }
          $destination = "pkg\bin\lang"
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          foreach ($code in $codes) {
            Copy-Item -LiteralPath (Join-Path "assets\release\lang" "$code.json") `
              -Destination (Join-Path $destination "$code.json") -Force
          }
          Write-Host "Validated and synchronized $($codes.Count) release language catalogs."

      - name: Synchronize normal-side easter egg audio
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $source = "assets\release\bin\dprk_easter_egg.mp3"
          $destination = "pkg\bin\dprk_easter_egg.mp3"
          if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
            throw "缺少正常系统端彩蛋音频: $source"
          }
          $sourceInfo = Get-Item -LiteralPath $source
          if ($sourceInfo.Length -lt 65536) {
            throw "正常系统端彩蛋音频大小异常: $($sourceInfo.Length) bytes"
          }
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $destination) | Out-Null
          Copy-Item -LiteralPath $source -Destination $destination -Force
          $sourceHash = (Get-FileHash -LiteralPath $source -Algorithm SHA256).Hash
          $destinationHash = (Get-FileHash -LiteralPath $destination -Algorithm SHA256).Hash
          if ($sourceHash -ne $destinationHash) {
            throw "正常系统端彩蛋音频复制后 SHA-256 不一致"
          }
          Write-Host "Synchronized normal-side easter egg audio: $destination ($sourceHash)"

      - name: Replace system-side exe
        shell: bash
        run: |
          set -euo pipefail
          # 产物可能在各 crate 的 target/（独立 crate）或工作区根 target/（workspace）
          src=""
          for p in "正常系统端/target/release/LetRecovery.exe" "target/release/LetRecovery.exe"; do
            if [ -f "$p" ]; then src="$p"; break; fi
          done
          test -n "$src" || { echo "找不到编译产物 LetRecovery.exe"; exit 1; }
          echo "Using system-side exe: $src"
          cp -f "$src" "pkg/LetRecovery.exe"

      - name: Inject PE-side exe into WIM
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wim   = "pkg\bin\pe\LetRecovery_PE.wim"
          $mount = Join-Path $env:RUNNER_TEMP "wimmount"
          New-Item -ItemType Directory -Force -Path $mount | Out-Null
          Write-Host "Mounting $wim ..."
          dism /Mount-Image /ImageFile:"$wim" /Index:1 /MountDir:"$mount"
          if ($LASTEXITCODE -ne 0) { throw "DISM mount failed" }
          $dst = Join-Path $mount "Program Files\LetRecoveryPE\LetRecoveryPE.exe"
          # 产物可能在 crate 的 target\ 或工作区根 target\
          $peExe = @("PE端\target\release\LetRecoveryPE.exe", "target\release\LetRecoveryPE.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $peExe) { throw "找不到编译产物 LetRecoveryPE.exe" }
          Write-Host "Using PE-side exe: $peExe"
          Copy-Item -Force $peExe $dst
          Write-Host "Replaced: $dst"
          # The PE client is native Win32-only. Remove the legacy Mesa shim from the base WIM so
          # release artifacts do not retain an unused OpenGL runtime after replacing the old EXE.
          $legacyOpenGl = Join-Path $mount "Program Files\LetRecoveryPE\opengl32.dll"
          if (Test-Path -LiteralPath $legacyOpenGl) {
            Remove-Item -LiteralPath $legacyOpenGl -Force
            Write-Host "Removed legacy OpenGL runtime: $legacyOpenGl"
          }
          $pcaSource = "pkg\bin\pca2023"
          $pcaDestination = Join-Path $mount "Program Files\LetRecoveryPE\bin\pca2023"
          New-Item -ItemType Directory -Force -Path $pcaDestination | Out-Null
          Copy-Item -Path (Join-Path $pcaSource "*") -Destination $pcaDestination -Recurse -Force
          Write-Host "Injected PCA2023 offline assets: $pcaDestination"
          $languageSource = "assets\release\lang"
          $languageDestination = Join-Path $mount "Program Files\LetRecoveryPE\lang"
          New-Item -ItemType Directory -Force -Path $languageDestination | Out-Null
          Copy-Item -Path (Join-Path $languageSource "*.json") -Destination $languageDestination -Force
          Write-Host "Injected release language catalogs: $languageDestination"
          dism /Unmount-Image /MountDir:"$mount" /Commit
          if ($LASTEXITCODE -ne 0) { throw "DISM unmount/commit failed" }

      - name: Clean WIM (drop orphaned streams shown as [DELETED])
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wim = "pkg\bin\pe\LetRecovery_PE.wim"
          Write-Host "=== WIM info BEFORE clean ==="
          dism /Get-WimInfo /WimFile:"$wim" /Index:1
          # 挂载提交会在 WIM 内留下被替换文件的旧数据流（7z/Bandizip 显示为 [DELETED]）。
          # /Export-Image 仅复制被引用的数据流到新 WIM，去掉孤立流；并保留映像名称与可启动标记。
          $tmp = "pkg\bin\pe\_LetRecovery_PE.clean.wim"
          if (Test-Path $tmp) { Remove-Item -Force $tmp }
          dism /Export-Image /SourceImageFile:"$wim" /SourceIndex:1 /DestinationImageFile:"$tmp" /Compress:max
          if ($LASTEXITCODE -ne 0) { throw "DISM export failed" }
          Remove-Item -Force $wim
          Move-Item -Force $tmp $wim
          Write-Host "=== WIM info AFTER clean ==="
          dism /Get-WimInfo /WimFile:"$wim" /Index:1

      - name: Update WIM MD5 in config.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, os, glob
          pkg = "pkg"
          cfg = os.path.join(pkg, "config.json")
          with open(cfg, "r", encoding="utf-8") as f:
              data = json.load(f)
          def md5_upper(path):
              h = hashlib.md5()
              with open(path, "rb") as fp:
                  for chunk in iter(lambda: fp.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest().upper()
          updated = []
          for entry in data.get("pe_cache", {}).get("pe_list", []):
              fn = entry.get("filename")
              if not fn:
                  continue
              matches = glob.glob(os.path.join(pkg, "**", fn), recursive=True)
              if not matches:
                  raise SystemExit(f"WIM not found in package for config entry: {fn}")
              new = md5_upper(matches[0])
              old = entry.get("md5")
              entry["md5"] = new
              updated.append((fn, old, new, matches[0]))
          if not updated:
              raise SystemExit("No pe_list entries updated; config.json structure unexpected")
          with open(cfg, "w", encoding="utf-8", newline="\n") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write("\n")
          for fn, old, new, p in updated:
              print(f"{fn}: {old} -> {new}  ({p})")
          PY
          echo "--- updated config.json ---"
          cat pkg/config.json

      - name: Upload PE WIM to 21Vianet OneDrive with rclone
        # Production releases always publish the new PE image. Test branches below
        # are prereleases and must never replace the public PE image or metadata.
        if: ${{ (inputs.branch || github.ref_name) == 'main' }}
        shell: pwsh
        env:
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_TENANT_ID: ${{ secrets.ONEDRIVE_TENANT_ID }}
          ONEDRIVE_USER_EMAIL: ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_REMOTE_ROOT: ${{ secrets.ONEDRIVE_REMOTE_ROOT }}
          ONEDRIVE_REMOTE_PATH: ${{ secrets.ONEDRIVE_REMOTE_PATH }}
        run: |
          $ErrorActionPreference = "Stop"

          foreach ($name in @("ONEDRIVE_CLIENT_ID", "ONEDRIVE_CLIENT_SECRET", "ONEDRIVE_TENANT_ID", "ONEDRIVE_USER_EMAIL")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing repository secret: $name"
            }
          }
          if ([string]::IsNullOrWhiteSpace($env:ONEDRIVE_REMOTE_PATH)) {
            throw "OneDrive remote path is empty"
          }
          if (-not $env:ONEDRIVE_REMOTE_PATH.StartsWith("/")) {
            throw "OneDrive remote path must start with '/': $env:ONEDRIVE_REMOTE_PATH"
          }

          $wimPath = "pkg\bin\pe\LetRecovery_PE.wim"
          if (-not (Test-Path -LiteralPath $wimPath)) {
            throw "WIM not found: $wimPath"
          }

          $wim = Get-Item -LiteralPath $wimPath
          $md5 = (Get-FileHash -LiteralPath $wim.FullName -Algorithm MD5).Hash.ToUpperInvariant()
          $root = $env:ONEDRIVE_REMOTE_ROOT.Trim([char]'/')
          $leaf = $env:ONEDRIVE_REMOTE_PATH.TrimStart([char]'/')
          $targetPath = if ([string]::IsNullOrWhiteSpace($root)) { $leaf } else { "$root/$leaf" }

          Write-Host "Uploading PE WIM to 21Vianet OneDrive: /$targetPath"
          Write-Host "Local WIM: $($wim.FullName)"
          Write-Host "Size: $($wim.Length) bytes"
          Write-Host "MD5: $md5"

          if (-not (Get-Command rclone -ErrorAction SilentlyContinue)) {
            choco install rclone -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "Failed to install rclone" }
          }
          rclone version
          if ($LASTEXITCODE -ne 0) { throw "rclone is not available" }

          $tokenBody = @{
            client_id = $env:ONEDRIVE_CLIENT_ID
            client_secret = $env:ONEDRIVE_CLIENT_SECRET
            scope = "https://microsoftgraph.chinacloudapi.cn/.default"
            grant_type = "client_credentials"
          }
          $tokenResponse = Invoke-RestMethod `
            -Method Post `
            -Uri "https://login.chinacloudapi.cn/$($env:ONEDRIVE_TENANT_ID)/oauth2/v2.0/token" `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $tokenBody `
            -TimeoutSec 60

          if ([string]::IsNullOrWhiteSpace($tokenResponse.access_token)) {
            throw "Failed to obtain Microsoft Graph access token"
          }

          $graphHeaders = @{
            Authorization = "Bearer $($tokenResponse.access_token)"
          }
          $encodedUser = [System.Uri]::EscapeDataString($env:ONEDRIVE_USER_EMAIL)
          $drive = Invoke-RestMethod `
            -Method Get `
            -Uri "https://microsoftgraph.chinacloudapi.cn/v1.0/users/$encodedUser/drive" `
            -Headers $graphHeaders `
            -TimeoutSec 60

          if ([string]::IsNullOrWhiteSpace($drive.id)) {
            throw "Failed to resolve OneDrive drive id for $($env:ONEDRIVE_USER_EMAIL)"
          }
          Write-Host "Resolved OneDrive drive id for $($env:ONEDRIVE_USER_EMAIL)"

          $env:RCLONE_CONFIG_LR_ONEDRIVE_TYPE = "onedrive"
          $env:RCLONE_CONFIG_LR_ONEDRIVE_REGION = "cn"
          $env:RCLONE_CONFIG_LR_ONEDRIVE_CLIENT_ID = $env:ONEDRIVE_CLIENT_ID
          $env:RCLONE_CONFIG_LR_ONEDRIVE_CLIENT_SECRET = $env:ONEDRIVE_CLIENT_SECRET
          $env:RCLONE_CONFIG_LR_ONEDRIVE_TENANT = $env:ONEDRIVE_TENANT_ID
          $env:RCLONE_CONFIG_LR_ONEDRIVE_CLIENT_CREDENTIALS = "true"
          $env:RCLONE_CONFIG_LR_ONEDRIVE_DRIVE_ID = $drive.id
          $env:RCLONE_CONFIG_LR_ONEDRIVE_DRIVE_TYPE = "business"

          rclone copyto `
            $wim.FullName `
            "lr_onedrive:$targetPath" `
            --onedrive-chunk-size 80Mi `
            --onedrive-upload-cutoff 4Mi `
            --onedrive-no-versions `
            --transfers 1 `
            --checkers 4 `
            --retries 5 `
            --low-level-retries 20 `
            --stats 10s `
            --progress
          if ($LASTEXITCODE -ne 0) {
            throw "rclone upload failed for /$targetPath"
          }

          rclone lsl "lr_onedrive:$targetPath"
          if ($LASTEXITCODE -ne 0) {
            throw "rclone upload verification failed for /$targetPath"
          }

      - name: Update LetRecovery server PE config
        if: ${{ (inputs.branch || github.ref_name) == 'main' }}
        shell: pwsh
        env:
          UPDATE_API_SECRET: ${{ secrets.UPDATE_API_SECRET }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          LETRECOVERY_UPDATE_API: ${{ secrets.LETRECOVERY_UPDATE_API }}
          LETRECOVERY_PE_URL: ${{ secrets.LETRECOVERY_PE_URL }}
          LETRECOVERY_PE_NAME: LetRecovery PE
          LETRECOVERY_PE_FILENAME: LetRecovery_PE.wim
        run: |
          $ErrorActionPreference = "Stop"

          foreach ($name in @("UPDATE_API_SECRET", "LETRECOVERY_UPDATE_API", "LETRECOVERY_PE_URL", "LETRECOVERY_PE_NAME", "LETRECOVERY_PE_FILENAME")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing value: $name"
            }
          }

          $wimPath = "pkg\bin\pe\LetRecovery_PE.wim"
          if (-not (Test-Path -LiteralPath $wimPath)) {
            throw "WIM not found: $wimPath"
          }

          $wim = Get-Item -LiteralPath $wimPath
          $md5 = (Get-FileHash -LiteralPath $wim.FullName -Algorithm MD5).Hash.ToUpperInvariant()
          $wimSha256 = (Get-FileHash -LiteralPath $wim.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          $wimSizeBytes = $wim.Length.ToString([System.Globalization.CultureInfo]::InvariantCulture)
          $timestamp = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds().ToString()
          $rand = [guid]::NewGuid().ToString("N")
          $version = "v0.0.0"
          $log = "Update LetRecovery PE WIM"
          $canSkip = "true"

          function Convert-BytesToHexLower([byte[]] $bytes) {
            return -join ($bytes | ForEach-Object { $_.ToString("x2") })
          }

          $payloadText = $env:LETRECOVERY_PE_URL + "`n" + $env:LETRECOVERY_PE_NAME + "`n" + $env:LETRECOVERY_PE_FILENAME + "`n" + $md5 + "`n" + $wimSha256 + "`n" + $wimSizeBytes
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          try {
            $payloadHash = Convert-BytesToHexLower ($sha256.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($payloadText)))
          } finally {
            $sha256.Dispose()
          }

          $signPayload = $timestamp + $rand + $version + $md5 + $log + $canSkip + $payloadHash
          $hmac = [System.Security.Cryptography.HMACSHA256]::new([System.Text.Encoding]::UTF8.GetBytes($env:UPDATE_API_SECRET))
          try {
            $sign = Convert-BytesToHexLower ($hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($signPayload)))
          } finally {
            $hmac.Dispose()
          }

          $body = [ordered]@{
            timestamp = $timestamp
            rand = $rand
            version = $version
            md5 = $md5
            log = $log
            can_skip = $canSkip
            letrecovery = $true
            payload_hash = $payloadHash
            sign = $sign
            lr_pe_url = $env:LETRECOVERY_PE_URL
            lr_pe_name = $env:LETRECOVERY_PE_NAME
            lr_pe_filename = $env:LETRECOVERY_PE_FILENAME
            lr_pe_md5 = $md5
            lr_pe_sha256 = $wimSha256
            lr_pe_size_bytes = $wimSizeBytes
          }

          $json = $body | ConvertTo-Json -Compress
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
          $bodyPath = Join-Path $env:RUNNER_TEMP "letrecovery-update-body.json"
          [System.IO.File]::WriteAllBytes($bodyPath, $bytes)

          $postScript = Join-Path $env:RUNNER_TEMP "letrecovery_post.py"
          @'
          import os
          import ssl
          import sys
          import urllib.error
          import urllib.request

          url = os.environ["LETRECOVERY_UPDATE_API"]
          body_path = os.environ["LETRECOVERY_UPDATE_BODY"]
          headers = {"Content-Type": "application/json; charset=utf-8"}
          deploy_token = os.environ.get("DEPLOY_TOKEN", "").strip()
          if deploy_token:
              headers["X-Deploy-Token"] = deploy_token

          with open(body_path, "rb") as f:
              body = f.read()

          request = urllib.request.Request(url, data=body, headers=headers, method="POST")
          context = ssl.create_default_context()
          try:
              with urllib.request.urlopen(request, context=context, timeout=60) as response:
                  sys.stdout.buffer.write(response.read())
          except urllib.error.HTTPError as exc:
              sys.stdout.buffer.write(exc.read())
              sys.exit(1)
          '@ | Set-Content -LiteralPath $postScript -Encoding UTF8

          $env:LETRECOVERY_UPDATE_BODY = $bodyPath
          $respRaw = & python $postScript
          if ($LASTEXITCODE -ne 0) {
            $respRaw
            throw "LetRecovery update API request failed"
          }

          $resp = ($respRaw -join "`n") | ConvertFrom-Json
          $resp | ConvertTo-Json -Depth 8
          if ($resp.code -ne 200 -or $resp.letrecovery_written -ne $true) {
            throw "LetRecovery update API rejected the request"
          }

      - name: Force safe defaults in config.json (easy mode and advanced options OFF)
        shell: bash
        run: |
          set -euo pipefail
          # 正式 release 的新装配置必须固定进入完整安装页；小白模式和高级选项都由
          # 用户在软件内主动开启，不能继承外部底包仓库中的维护机偏好。
          test -f pkg/config.json || { echo "pkg/config.json 不存在"; exit 1; }
          python - <<'PY'
          import json, io
          p = "pkg/config.json"
          d = json.load(open(p, encoding="utf-8"))
          before_easy = d.get("easy_mode_enabled")
          before_advanced = d.get("enable_advanced_options")
          d["easy_mode_enabled"] = False
          d["enable_advanced_options"] = False
          io.open(p, "w", encoding="utf-8", newline="\n").write(json.dumps(d, ensure_ascii=False, indent=2) + "\n")
          check = json.load(open(p, encoding="utf-8"))
          if check.get("easy_mode_enabled") is not False or check.get("enable_advanced_options") is not False:
              raise SystemExit("failed to normalize release defaults")
          print("easy_mode_enabled:", before_easy, "-> False")
          print("enable_advanced_options:", before_advanced, "-> False")
          PY
          echo "已强制 easy_mode_enabled=False, enable_advanced_options=False"

      - name: Prepare package README
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pkg/images pkg/assets
          if [ -f assets/release/README.txt ]; then
            cp -f assets/release/README.txt pkg/README.txt
          else
            echo "warning: assets/release/README.txt 不存在（该分支可能未包含），跳过"
          fi
          echo "--- package README ---"
          ls -la pkg/README.txt 2>/dev/null || true

      - name: Repackage into LetRecovery.7z
        shell: bash
        run: |
          set -euo pipefail
          rm -f LetRecovery.7z
          ( cd pkg && 7z a -t7z -mx=9 -m0=lzma2 -ms=on ../LetRecovery.7z ./* >/dev/null )
          ls -la LetRecovery.7z

      - name: Install Inno Setup 6.7.1
        shell: pwsh
        run: |
          choco install innosetup --version=6.7.1 --yes --no-progress
          $exitCode = $LASTEXITCODE
          if (@(0, 1605, 1614, 1641, 3010) -notcontains $exitCode) {
            throw "Chocolatey failed to install Inno Setup 6.7.1 (exit code $exitCode)"
          }

          $compiler = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            (Get-Command ISCC.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1)
          ) | Where-Object {
            -not [string]::IsNullOrWhiteSpace($_) -and
            (Test-Path -LiteralPath $_ -PathType Leaf)
          } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($compiler)) {
            throw "Inno Setup 6.7.1 was installed but ISCC.exe was not found"
          }

          $compiler = (Resolve-Path -LiteralPath $compiler).Path
          "INNO_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Inno Setup compiler: $compiler"

      - name: Build offline installer EXE
        shell: pwsh
        run: |
          $output = Join-Path $env:GITHUB_WORKSPACE "installer\output"
          if (Test-Path -LiteralPath $output) {
            Remove-Item -LiteralPath $output -Recurse -Force
          }
          New-Item -ItemType Directory -Path $output | Out-Null

          & .\installer\build-installer.ps1 `
            -SourceDirectory (Resolve-Path .\pkg).Path `
            -OutputDirectory $output `
            -InnoCompiler $env:INNO_COMPILER

          $installer = Join-Path $output "LetRecovery-Setup-x64.exe"
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "Installer build did not produce LetRecovery-Setup-x64.exe"
          }

      - name: Verify the two Release assets
        shell: pwsh
        run: |
          $archive = (Resolve-Path .\LetRecovery.7z).Path
          $installerDirectory = (Resolve-Path .\installer\output).Path
          $installer = Join-Path $installerDirectory "LetRecovery-Setup-x64.exe"

          & 7z t $archive
          if ($LASTEXITCODE -ne 0) {
            throw "LetRecovery.7z integrity test failed with exit code $LASTEXITCODE"
          }

          $installerFiles = @(Get-ChildItem -LiteralPath $installerDirectory -File)
          if ($installerFiles.Count -ne 1 -or $installerFiles[0].Name -ne "LetRecovery-Setup-x64.exe") {
            $names = $installerFiles.Name -join ", "
            throw "Installer output must contain exactly LetRecovery-Setup-x64.exe; found: $names"
          }

          $assets = @(
            Get-Item -LiteralPath $archive
            Get-Item -LiteralPath $installer
          )
          foreach ($asset in $assets) {
            if ($asset.Length -le 0) {
              throw "Release asset is empty: $($asset.FullName)"
            }
            $hash = (Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash
            Write-Host "$($asset.Name): $($asset.Length) bytes, SHA-256 $hash"
            "- ``$($asset.Name)`` — $($asset.Length) bytes — SHA-256 ``$hash``" |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Determine tag
        id: tag
        shell: pwsh
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:REQUESTED_TAG.Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = (Get-Date).ToUniversalTime().ToString('yyyy.M.d')
          }
          & git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Invalid Release tag: $tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Tag: $tag"

      - name: Stage fixed website version for validation
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          & pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .\.github\scripts\update-website-version.ps1 -ReleaseTag $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to stage the website Release version"
          }

      - name: Setup Node for website validation
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 官网/package-lock.json

      - name: Validate website with the release version
        shell: bash
        working-directory: 官网
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run type-check
          npm run build

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="$(git rev-parse HEAD)"
          BR="${{ inputs.branch || github.ref_name }}"
          PRE=""
          # 非 main 分支视为测试构建：标记为 prerelease 并注明请勿使用
          {
            if [ "$BR" != "main" ]; then
              PRE="--prerelease"
              printf '%s\n\n' "⚠️ 测试构建，请勿使用 / TEST BUILD — DO NOT USE."
              printf '%s\n\n' "此 release 由非 main 分支（${BR}）构建，仅供测试，可能不稳定。"
            fi
            printf '%s\n' "Automated build from branch ${BR} (commit ${SHA})."
          } > release_notes.md
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag || true
          gh release create "$TAG" \
            LetRecovery.7z \
            installer/output/LetRecovery-Setup-x64.exe \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file release_notes.md \
            $PRE
          echo "Released $TAG with LetRecovery.7z and LetRecovery-Setup-x64.exe (prerelease: ${PRE:-no})"

      - name: Commit released website version
        shell: pwsh
        env:
          RELEASE_BRANCH: ${{ inputs.branch || github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $branch = $env:RELEASE_BRANCH.Trim()
          if ($branch.StartsWith("refs/heads/", [StringComparison]::Ordinal)) {
            $branch = $branch.Substring("refs/heads/".Length)
          }
          if ([string]::IsNullOrWhiteSpace($branch)) {
            throw "Release branch is empty"
          }
          & git check-ref-format "refs/heads/$branch"
          if ($LASTEXITCODE -ne 0) {
            throw "Invalid Release branch: $branch"
          }

          $versionFile = "官网/version.json"
          $changes = @(git status --porcelain --untracked-files=no -- $versionFile)
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to inspect website version changes"
          }
          if ($changes.Count -eq 0) {
            Write-Host "Website version already matches this Release; no commit is required."
            exit 0
          }

          & git diff --check -- $versionFile
          if ($LASTEXITCODE -ne 0) {
            throw "Website version diff validation failed"
          }

          & git config user.name "github-actions[bot]"
          & git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          & git add -- $versionFile
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to stage website version"
          }

          $stagedFiles = @(git -c core.quotepath=false diff --cached --name-only)
          if ($LASTEXITCODE -ne 0 -or $stagedFiles.Count -ne 1 -or $stagedFiles[0] -ne $versionFile) {
            throw "Release version commit must contain only $versionFile"
          }

          $version = [string](Get-Content -Raw -Encoding UTF8 -LiteralPath $versionFile | ConvertFrom-Json).version
          & git commit -m "chore(website): update version to $version [skip ci]"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to commit website version"
          }
          & git push origin "HEAD:refs/heads/$branch"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push website version commit to $branch"
          }
