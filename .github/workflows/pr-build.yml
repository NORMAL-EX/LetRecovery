name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Build Rust workspace
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin reproducible build timestamp
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install Rust 1.88 toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt check
        run: cargo fmt --all --check

      - name: Cargo check (workspace and all targets)
        run: cargo check --workspace --all-targets --locked

      - name: Cargo clippy (deny warnings)
        # Rust 1.88 reports this style-only lint differently from newer supported toolchains.
        # Keep every behavioral warning blocking while avoiding a version-dependent rewrite.
        run: cargo clippy --workspace --all-targets --locked --features "LetRecovery/non-elevated-tests,letrecovery-pe/non-elevated-tests" -- -D warnings -A clippy::uninlined_format_args

      # 编译所有测试目标（含 #[cfg(test)]），把“测试代码编不过”也变成阻塞失败。
      # 测试专用 feature 只让测试二进制以 asInvoker 启动；release 构建会主动拒绝该 feature。
      - name: Compile all test targets
        run: cargo test --workspace --no-run --locked --features "LetRecovery/non-elevated-tests,letrecovery-pe/non-elevated-tests"

      # 运行两端完整的确定性单元测试。依赖真实 Windows 主机状态的测试必须显式 #[ignore]，
      # CI 不使用 --ignored，也不执行真实磁盘、BitLocker、DISM、BCD 或注册表写入操作。
      - name: Run pure-logic unit tests
        run: |
          cargo test -p lr-core --locked
          cargo test -p letrecovery-pe --locked --features non-elevated-tests
          cargo test -p LetRecovery --locked --features non-elevated-tests

  website:
    name: Build 官网
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 官网
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 官网/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
